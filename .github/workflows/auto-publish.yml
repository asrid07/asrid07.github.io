# ============================================================
# TrendPulse Daily - Automatic Blog Publishing Workflow
# ============================================================
# This GitHub Action automatically generates and publishes 
# new blog posts daily. It runs the Python post generator,
# commits new posts, and pushes to trigger GitHub Pages rebuild.
#
# Schedule: Runs daily at 6:00 AM UTC (11:30 AM IST)
# Manual: Can also be triggered manually from Actions tab
# ============================================================

name: "Auto Publish Blog Posts"

on:
  # Run daily at 6:00 AM UTC
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      post_count:
        description: "Number of posts to generate"
        required: false
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
      category:
        description: "Category (leave empty for random)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "Technology"
          - "Finance"
          - "Health"
          - "Science"
          - "Business"
          - "Education"
          - "Lifestyle"
          - "Entertainment"

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📝 Generate Blog Posts"
        run: |
          echo "🤖 TrendPulse Daily - Generating new blog posts..."
          
          # Determine post count
          COUNT="${{ github.event.inputs.post_count || '1' }}"
          CATEGORY="${{ github.event.inputs.category || '' }}"
          
          # Build command
          CMD="python scripts/generate_post.py --count $COUNT"
          if [ -n "$CATEGORY" ]; then
            CMD="$CMD --category \"$CATEGORY\""
          fi
          
          echo "Running: $CMD"
          eval $CMD

      - name: "📊 Check for New Posts"
        id: check_changes
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            # Check for untracked files
            UNTRACKED=$(git ls-files --others --exclude-standard _posts/)
            if [ -z "$UNTRACKED" ]; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "ℹ️ No new posts generated (may be duplicates)"
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "✅ New posts detected!"
              echo "$UNTRACKED"
            fi
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected!"
          fi

      - name: "🚀 Commit & Push New Posts"
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "TrendPulse Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage new posts
          git add _posts/
          
          # Create descriptive commit message
          DATE=$(date +"%Y-%m-%d")
          POST_COUNT=$(git diff --staged --name-only | wc -l)
          TITLES=$(git diff --staged --name-only | sed 's/.*\///' | sed 's/\.md//' | sed 's/^[0-9-]*//' | sed 's/-/ /g' | head -3)
          
          git commit -m "📝 Auto-publish: ${POST_COUNT} new post(s) - ${DATE}" \
                     -m "Generated by TrendPulse Auto Publisher" \
                     -m "Posts: ${TITLES}"
          
          git push origin main
          
          echo "✅ Successfully published new blog posts!"
          echo "🌐 Posts will be live at https://asrid07.github.io in ~2 minutes"

      - name: "📋 Summary"
        run: |
          echo "## 📊 Auto-Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date +"%Y-%m-%d %H:%M UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "| New Posts | ${{ steps.check_changes.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📂 Current Posts" >> $GITHUB_STEP_SUMMARY
          ls -la _posts/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No posts directory" >> $GITHUB_STEP_SUMMARY
